source_binding:
  phase1_config: "configs/phase1_benchmark.yaml"
  d042_result: "data/processed/reporting/post_gate5_d042_agefrk/campaign_result.json"
  qml_source: "src/openqfuel/qml.py"
  campaign_source: "scripts/run_post_gate5_d043_sfrk.py"
  protocol_source: "docs/post_gate5_d043_sfrk_protocol.md"

mathematical_contract:
  input: "D039 error-conditioned fold-local task-aligned score z in R^q"
  residual_target: "e_i = y_i - b_C06^{-inner}(x_i) from outer-training rows"
  stacking_weight: "clip(sum((u-v)(e-v))/sum((u-v)^2), 0, 1), default 0.5 if denominator is zero"
  candidate_prediction: "b_C06(x) + 0.10 [w_F delta_F(x) + (1-w_F) delta_R25(x)]"
  classical_control: "b_C06(x) + 0.10 [w_C delta_R25(x) + (1-w_C) delta_R50(x)]"
  safety_guard: "the frozen outer-fold C06 feasibility head is retained unchanged"

candidate:
  id: "SFRK"
  name: "Cross-Fitted Residual Fidelity-RBF Stack"
  primary_configuration: "SFRK-08-CV"
  shrinkage: 0.10
  q_values: [4, 6, 8]
  inner_stack_ridge: 0.000001
  rbf_gamma_multipliers: [0.25, 0.50]
  configurations:
    - {id: SFRK-04-CV, qubits: 4, layers: 1, feature_scale: 1.0, entangle: true, alpha: 1.0, landmarks: 256}
    - {id: SFRK-06-CV, qubits: 6, layers: 1, feature_scale: 1.0, entangle: true, alpha: 1.0, landmarks: 256}
    - {id: SFRK-08-CV, qubits: 8, layers: 1, feature_scale: 1.0, entangle: true, alpha: 1.0, landmarks: 256}
  configuration_rule: "q grid and stack rule are fixed before development payload access; q=8 is primary"
  claimed_mechanism: "cross-fitted training residuals may identify expert specialization without using outer validation outcomes"

controls:
  - id: C06
    description: "frozen outer-fold C06 prediction with the same safety guard"
  - id: TWO-RBF-CV
    description: "cross-fitted convex stack of RBF gamma 0.25 and gamma 0.50 corrections"
  - id: D042-AGEFRK
    description: "immutable D042 result, not rerun or reranked"

hypotheses:
  H1: "SFRK-08-CV will improve pooled OOF NRMSE by at least 5 percent versus C06"
  H2: "SFRK-08-CV will improve or preserve C06 feasibility-constrained regret and infeasible selection"
  H3: "SFRK-08-CV will beat TWO-RBF-08-CV by at least 5 percent"

decision_rule:
  scientifically_superior: "H1, H2, and H3 pass across five outer folds and 20 seeds, with the paired 95 percent bootstrap upper bound for SFRK-08-CV minus C06 below zero"
  valid_negative: "complete source-bound endpoint with all integrity checks pass but any superiority condition fails"
  technical_stop: "source, split, inner-fit, feature, weight, data-access, numerical, or resource integrity failure"
  after_negative: "record the evidence and open a new protocol; do not silently alter the stack, channels, clipping rule, controls, thresholds, or seeds"

resources:
  hardware: "recorded laptop: Intel Core i9-13900HX, 32 GiB RAM, NVIDIA RTX 4060 Laptop GPU; CPU-only execution"
  peak_working_set_gib: 24.0
  cpu_core_hours: 250.0
  wall_clock_days: 5.0
  free_disk_floor_gib: 17.0
  gpu_hours: 0.0

reporting:
  result_root: "data/processed/reporting/post_gate5_d043_sfrk"
  figures: [RFIG-072, RFIG-073]
  figure_script: "scripts/make_post_gate5_d043_sfrk_figures.py"
  claim_boundary: "development-only surrogate evidence; no NASA performance claim, mission claim, hardware claim, quantum advantage claim, calibration/final-test result, Gate 5 revision, or Gate 6 authorization"
