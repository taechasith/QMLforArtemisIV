mathematical_contract:
  shared_first_stage: "r25_8 = RBF_0.25_q8(x; e)"
  common_orthogonalized_target: "e2 = e - r25_8_OOF on inner grouped out-of-fold rows"
  candidate_second_stage: "F_8(e2)"
  control_second_stage: "RBF_0.50_q8(e2)"
  shrinkage_grid: [0.05, 0.10, 0.15]
  shrinkage_selection: "argmin ||e - lambda*(r25_8+s_m)||^2 on inner-training OOF rows over the identical declared grid for candidate and control"
  candidate_prediction: "b_C06(x) + lambda_A * (r25_8(x) + F_8(x; e2))"
  classical_control: "b_C06(x) + lambda_C * (r25_8(x) + RBF_0.50_q8(x; e2))"
  safety_guard: "the frozen outer-fold C06 feasibility head is retained unchanged"

candidate:
  id: "NSORFRK"
  name: "Nested-Shrinkage Orthogonalized Fidelity-RBF Kernel"
  primary_configuration: "NSORFRK-08"
  q: 8
  rbf_gamma_multipliers: [0.25, 0.50]
  landmarks: 256
  projection_layers: 1
  configuration_rule: "q8, stage order, grid, tie rule, folds, seeds, channels, and control are fixed before development payload access"
  claimed_mechanism: "training-only shrinkage selection may correct fixed residual correction amplitude without reopening multi-scale overfit"

controls:
  - id: C06
    description: "frozen outer-fold C06 prediction with the same safety guard"
  - id: NSO-TWO-RBF-08
    description: "same q8 orthogonalized construction and shrinkage grid with RBF-0.50 second stage"
  - id: D046-ORFRK
    description: "immutable D046 q8 result, not rerun or reranked"

hypotheses:
  H1: "NSORFRK-08 will improve pooled OOF NRMSE by at least 5 percent versus C06"
  H2: "NSORFRK-08 will improve or preserve C06 feasibility-constrained regret and infeasible selection"
  H3: "NSORFRK-08 will beat NSO-TWO-RBF-08 by at least 5 percent"

decision_rule:
  scientifically_superior: "H1, H2, and H3 pass across five outer folds and 20 seeds, with paired 95 percent bootstrap upper bound for NSORFRK-08 minus C06 below zero"
  valid_negative: "complete source-bound endpoint with all integrity checks pass but any superiority condition fails"
  technical_stop: "source, split, grid, nested-selection, data-access, numerical, or resource integrity failure"
  after_negative: "record the evidence and open a new protocol; do not silently alter q, grid, tie rule, control, thresholds, folds, or seeds"

