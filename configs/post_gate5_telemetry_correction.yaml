  pass_figure: "RFIG-030"
  pass_figure_generator: "scripts/make_post_gate5_preflight_result_figure.py"
  pass_figure_content: "conservative projected resource utilization against accepted laptop ceilings"
  claim_boundary: "synthetic compute admission only; not QML performance, research-data fitting, Gate 5 reinterpretation, or Gate 6 evidence"
  stop_figure_rule: "update RFIG-029 and the future-research register if attempt 2 stops"

outcome:
