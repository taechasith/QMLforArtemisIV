mathematical_contract:
  shared_first_stage_gain: 0.10
  shared_first_stage: "r25_8 = RBF_0.25_q8(x; e)"
  common_orthogonalized_target: "e2 = e - r25_8_OOF on inner grouped out-of-fold rows"
  candidate_second_stage: "F_8(e2)"
  control_second_stage: "RBF_0.50_q8(e2)"
  second_stage_gain_grid: [0.05, 0.10, 0.15, 0.20]
  gain_selection: "argmin ||e - 0.10*r25_8 - g*s_m||^2 on inner-training OOF rows"
  candidate_prediction: "b_C06(x) + 0.10*r25_8(x) + g_A*F_8(x; e2)"
  classical_control: "b_C06(x) + 0.10*r25_8(x) + g_C*RBF_0.50_q8(x; e2)"
  safety_guard: "the frozen outer-fold C06 feasibility head is retained unchanged"

candidate:
  id: "SSORFRK"
  name: "Stage-Separated Orthogonalized Fidelity-RBF Kernel"
  primary_configuration: "SSORFRK-08"
  q: 8
  rbf_gamma_multipliers: [0.25, 0.50]
  landmarks: 256
  projection_layers: 1
  configuration_rule: "shared gain 0.10, q8, stage order, gain grid, tie rule, folds, seeds, channels, and control are fixed before development payload access"
  claimed_mechanism: "calibrate unique fidelity gain without allowing shared classical correction amplitude to move"

controls:
  - id: C06
    description: "frozen outer-fold C06 prediction with the same safety guard"
  - id: SSO-TWO-RBF-08
    description: "same q8 orthogonalized stages with fixed shared gain and independently selected RBF second-stage gain"
  - id: D046-ORFRK
    description: "immutable D046 q8 result, not rerun or reranked"

hypotheses:
  H1: "SSORFRK-08 will improve pooled OOF NRMSE by at least 5 percent versus C06"
  H2: "SSORFRK-08 will improve or preserve C06 feasibility-constrained regret and infeasible selection"
  H3: "SSORFRK-08 will beat SSO-TWO-RBF-08 by at least 5 percent"

decision_rule:
  scientifically_superior: "H1, H2, and H3 pass across five outer folds and 20 seeds, with paired 95 percent bootstrap upper bound for SSORFRK-08 minus C06 below zero"
  valid_negative: "complete source-bound endpoint with all integrity checks pass but any superiority condition fails"
  technical_stop: "source, split, fixed-shared-gain, nested-selection, data-access, numerical, or resource integrity failure"
  after_negative: "record the evidence and do not reopen multi-scale stacking or whole-correction shrinkage selection"

