discussion_questions:
  - "Which D011 failure modes are likely representation limits rather than optimization or compute limits?"
  - "What future QML variant could be prospectively specified without reusing D011 outcomes for tuning?"
  - "Which stronger classical controls must accompany any future QML attempt?"
  - "What minimum development-only evidence would be required before asking for calibration, final-test, hardware, or Gate 6 authority?"

future_protocol_candidates:
  - id: "D012-A"
    title: "Task-informed local-observable projected kernel"
    source_negative: "P001-FR004"
    rationale: "Q01b had poor cost-regression NRMSE and zero qualifying regimes, suggesting the one-RDM Pauli projection did not encode the cost target usefully."
    prospective_change: "Define richer local observable projections or task-informed encodings before any new outcome is visible."
    required_controls: [A02, random_feature_rbf, compressed_mlp, physics_residual_control, C06]
    near_term_priority: "highest_if_future_QML_is_pursued"
    authorization_status: "discussion_only"
  - id: "D012-B"
    title: "Class-sensitive feasibility quantum kernel"
    source_negative: "P001-FR005"
    rationale: "FQK underperformed C02-T02 on AUROC, Brier, and recall; the frozen 0.5 threshold produced high false-negative rate."
    prospective_change: "Specify class-sensitive kernel training and a separately frozen safety threshold selection rule."
    required_controls: [C02_T02, calibrated_logistic, class_weighted_tree_ensemble, A02, C06]
    near_term_priority: "secondary_if_future_QML_is_pursued"
    authorization_status: "discussion_only"
  - id: "D012-C"
    title: "Classical-first residual and safety-filter hardening"
    source_negative: "P001-FR004_and_P001-FR005"
    rationale: "Both QML tracks were weaker than classical controls, so publication impact may be higher if the next protocol first hardens classical residual and safety-filter baselines."
    prospective_change: "Improve physics-residual controls and safety-filter calibration before proposing another QML branch."
    required_controls: [C06, C02_T02, physics_residual_control, conformal_or_quantile_safety_filter]
    near_term_priority: "recommended_before_any_new_QML_experiment"
    authorization_status: "discussion_only"

claim_boundary: "D012 is a future-protocol discussion opened from negative development-only evidence. It does not authorize new experiments, refits, reranking, calibration/final-test access, hardware/GPU execution, Gate 5 reinterpretation, quantum-advantage claims, or Gate 6."
