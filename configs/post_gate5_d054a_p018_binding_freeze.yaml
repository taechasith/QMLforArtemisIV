authority_boundary:
  binding_freeze_authorized: true
  binding_figure_authorized: true
  numerical_audit_execution_authorized: false
  source_manifest_read_authorized: false
  development_data_read_authorized: false
  dataset_generation_authorized: false
  model_fit_authorized: false
  calibration_access_authorized: false
  final_test_access_authorized: false
  hardware_execution_authorized: false
  gpu_execution_authorized: false
  future_audit_figure_rendering_authorized: false
  gate5_reinterpretation_authorized: false
  gate6_authorized: false
  next_required_decision: "D055 must separately authorize one bounded Stage 1 audit against this exact binding."

physical_scope:
  state_frame: "Earth-centered J2000/ICRF-compatible inertial Cartesian axes"
  state_vector: "z=(r_x,r_y,r_z km, v_x,v_y,v_z km/s, m kg)"
  base_group: "SO(3) proper rotations only; translations and reflections are excluded"
  active_force_models:
    F0:
      enabled_terms: ["Earth point-mass gravity"]
      maneuver: "impulsive"
    F1:
      enabled_terms: ["Earth point-mass gravity", "Moon third-body gravity", "Sun third-body gravity"]
      maneuver: "fixed-direction finite burn with mass depletion"
    F2:
      enabled_terms: ["Earth point-mass gravity", "Moon third-body gravity", "Sun third-body gravity", "Earth J2"]
      maneuver: "fixed-direction finite burn with mass depletion"
  deterministic_srp:
    active: false
    prohibition: "No directional SRP acceleration is implemented or activated. The SRP process-noise entry remains inactive because the frozen scenario generator uses scalar pressure-swing disturbance instead."
    deviation_rule: "Adding deterministic SRP requires a separate force-model, numerical-validation, and protocol decision; it is not a P018 feature change."
  inertial_constraint_interpretation:
    target_frame_vectors: ["target_position_j2000_km", "target_velocity_j2000_km_s"]
    burn_direction: "An input vector transformed jointly with state; it is not a fixed-context stabilizer vector."
    crew_axis_mapping: "No fixed inertial body axis is introduced: the frozen simulator aligns the vehicle to burn attitude before body-axis checks."

audit_record_schema:
  status: "schema bound only; no record is generated by D054-A"
  state_tensor_order:
    - "position_j2000_km[0:3]"
    - "velocity_j2000_km_s[0:3]"
    - "mass_kg"
  context_tensor_order:
    - "moon_position_j2000_km[0:3]"
    - "sun_position_j2000_km[0:3]"
    - "earth_j2_axis_j2000_unit[0:3]"
    - "target_position_j2000_km[0:3]"
    - "target_velocity_j2000_km_s[0:3]"
  scalar_constraint_order:
    - "fidelity"
    - "candidate_burn_start_offset_s"
    - "candidate_burn_duration_s"
    - "thrust_scale"
    - "communication_hold_min"
    - "burn_delay_min"
    - "initial_mass_kg"
    - "usable_propellant_remaining_kg"
    - "maximum_candidate_delta_v_m_s=20.0"
  transformed_input_order:
    - "candidate_burn_direction_j2000_unit[0:3]"
  schema_rule: "Every vector is supplied to every future classical and quantum method in the same units and order. Existing D006-D049 39-feature rows are prohibited because they omit the context tensor."

quantum_algebra_binding:
  role: "minimal algebraic audit representation only; not a fitted PQC or a quantum-advantage claim"
  qubit_count: 4
  representation:
    name: "four-spin collective SO(3) representation"
    definition: "V(R)=u(R) tensor-product u(R) tensor-product u(R) tensor-product u(R), where u(R) is either SU(2) lift of R"
    lift_rule: "q=4 is even, so the two SU(2) lifts differ by (-I)^4=I; V is single-valued on SO(3)."
    raw_generators:
      J_x: "-0.5j*(X0+X1+X2+X3)"
      J_y: "-0.5j*(Y0+Y1+Y2+Y3)"
      J_z: "-0.5j*(Z0+Z1+Z2+Z3)"
    numerical_normalization: "Archive each raw generator and divide every nonzero generator by its normalized real Hilbert-Schmidt norm before C construction."
  dla:
    real_lie_algebra: "su(16) represented as skew-Hermitian 4-qubit Pauli strings"
    basis_definition: "B_P=iP for every nonidentity P in {I,X,Y,Z}^4, ordered lexicographically with qubit 0 leftmost"
    basis_dimension: 255
    inner_product: "<A,B>=Re Tr(A^dagger B)/2^4"
    expected_generator_set:
      local_controls: ["X0", "Z0", "X1", "Z1", "X2", "Z2", "X3", "Z3"]
      entanglers: ["Z0Z1", "Z1Z2", "Z2Z3"]
      skew_hermitian_lift: "i times every listed Hermitian Pauli generator"
    closure_requirement: "The coefficient-space Lie closure of the listed generators must have dimension 255 and equal the frozen Pauli basis. Any mismatch is a terminal D054-A algebra-binding STOP; do not replace the basis or generators."
    centralizers:
      base: "c_G=ker(C_Jx stacked C_Jy stacked C_Jz)"
      axial: "c_SO2(n)=ker(C_Jn), where Jn=n_x Jx+n_y Jy+n_z Jz and n is a frozen unit context axis"
      generic_context: "If the connected stabilizer is identity, set c_H=L directly without an empty SVD."
    complement_rule: "m=c_H intersect c_G_perp is an algebraic candidate set only. It is not called horizontal and may not be inserted into a PQC without a later authorization and reductive-decomposition evidence."

fixed_context_stabilizer_binding:
  method: "Normalize the applicable nonzero fixed-context vectors, construct a 3-by-n direction matrix, and use direct SVD with tau=max(shape)*eps_float64*sigma_max to determine its rank."
  dynamical_context_vectors:
    F0: []
    F1: ["moon_position_j2000_km", "sun_position_j2000_km"]
    F2: ["moon_position_j2000_km", "sun_position_j2000_km", "earth_j2_axis_j2000_unit"]
  task_context_vectors:
    F0: ["target_position_j2000_km", "target_velocity_j2000_km_s"]
    F1: ["moon_position_j2000_km", "sun_position_j2000_km", "target_position_j2000_km", "target_velocity_j2000_km_s"]
    F2: ["moon_position_j2000_km", "sun_position_j2000_km", "earth_j2_axis_j2000_unit", "target_position_j2000_km", "target_velocity_j2000_km_s"]
  rank_interpretation:
    0: "SO(3)"
    1: "SO(2) about the unique normalized direction"
    2: "identity connected stabilizer"
    3: "identity connected stabilizer"
  model_mechanism_rule: "Report both dynamical and task stabilizers. Only the task stabilizer may define c_H for a later model mechanism because labels and constraints include the fixed target frame."
  hard_stops:
    - "missing, nonfinite, or zero required context vector"
    - "unresolved stabilizer rank across the D053-C 0.1*tau/tau/10*tau sweep"
    - "frame mismatch between any state, ephemeris, target, or axis vector"

rotation_suite:
  construction: "Rodrigues formula in float64; normalize each listed axis before matrix construction and require det(R)=1 and R^T R=I within 1e-12."
  include_identity: true
  rotations:
    - {id: R0_IDENTITY, axis: [1.0, 0.0, 0.0], angle_rad: 0.0}
    - {id: R1_X_POS_90, axis: [1.0, 0.0, 0.0], angle_rad: 1.5707963267948966}
    - {id: R2_Y_POS_90, axis: [0.0, 1.0, 0.0], angle_rad: 1.5707963267948966}
    - {id: R3_Z_POS_90, axis: [0.0, 0.0, 1.0], angle_rad: 1.5707963267948966}
    - {id: R4_DIAGONAL_PI, axis: [1.0, 1.0, 0.0], angle_rad: 3.141592653589793}
    - {id: R5_GENERIC_POS, axis: [1.0, 2.0, 3.0], angle_rad: 1.0471975511965976}
    - {id: R6_GENERIC_NEG, axis: [-2.0, 1.0, 2.0], angle_rad: -1.2566370614359172}
  transformed_objects: ["state position", "state velocity", "Moon vector", "Sun vector", "J2 axis", "target position", "target velocity", "candidate burn direction"]
  fixed_context_rule: "For D_break and D_y, rotate state and candidate burn direction only; hold all fixed context vectors and scalar constraints unchanged."
  joint_covariance_rule: "For D_cov, rotate every listed vector jointly and preserve all scalar constraints."

development_only_case_binding:
  selection_status: "identity rule frozen; no manifest, feature, label, calibration, or final-test row read by D054-A"
  allowed_split: "development"
  prohibited_splits: ["uncertainty_calibration", "in_distribution_final_test", "out_of_distribution_final_test"]
  group_ids: ["G01", "G02", "G03", "G04", "G05", "G06", "G07", "G08", "G09", "G10", "G11", "G12"]
  uncertainty_families: ["U0", "U1", "U2", "U3", "U4"]
  fidelities: ["F0", "F1", "F2"]
  decision_set_index: 1
  candidate_index: 2
  replicate_index: 2
  scenario_identity_template: "{fidelity}-{group_id}-000002"
  source_case_count: 36
  nonidentity_rotation_count: 6
  maximum_propagations: 936
  propagation_accounting: "36 source cases times one unrotated, six joint-rotated, and six fixed-context-rotated trajectories times baseline/tightened solver settings."
  source_rule: "A future runner may reconstruct only these identities under the new audit-record schema. It must not copy labels or context from existing D006-D049 payloads."
  workload_rule: "One expensive F2 process at a time. A clean-source compute preflight remains required before execution."

defect_and_target_binding:
  acceleration_floor:
    eps_a_km_s2: 1.0e-12
    rationale: "Fixed numerical denominator guard of 1e-9 m/s^2. It is not estimated from audit outcomes or treated as a physical force magnitude."
  primary_target:
    name: "robust_total_correction_delta_v_m_s"
    formula_source: "configs/scenario_generation.yaml robust_cost definition"
    y_scale_m_s: 20.0
    rationale: "The frozen maximum candidate delta-v and infeasible-regret penalty are both 20 m/s. This is a normalization only; it does not change the target, threshold, or decision rule."
  target_mechanism_admission:
    population: "All F1 and F2 source cases under R1-R6; cluster resampling unit is the unrotated source case."
    minimum_stable_nonzero_label_defect_fraction: 0.75
    minimum_label_defect: 0.01
    interpretation: "D_y>=0.01 corresponds to 0.2 m/s under y_scale=20 m/s."
    association_metric: "absolute Spearman correlation between D_break and D_y"
    minimum_absolute_spearman: 0.30
    bootstrap_resamples: 2000
    bootstrap_seed: 20260754
    confidence_rule: "Two-sided 95 percent cluster-bootstrap interval must exclude zero."
    failure_action: "Stop P018 before any model design or fit. Report the negative target-mechanism result and future-only discussion."

