mathematical_contract:
  outer_input: "D036 fold-local task-aligned scores z in R^q"
  target: "cross-fitted C06 residual e_i = y_i - b_C06^{-inner}(x_i)"
  quantum_state: "psi(z) = U_RY/RZ,CNOT(z)|0^q> with one entangling layer"
  quantum_kernel: "K_F(z,v) = |<psi(z)|psi(v)>|^2"
  prediction: "f_Q(x) = b_C06^outer(x) + 0.10 * K_F(z,Z) alpha"
  classical_control: "TAP-RBF-SHR-q uses the identical z, landmarks, ridge solve, and lambda=0.10"
  safety_guard: "the frozen outer-fold C06 feasibility head is retained unchanged"

candidate:
  id: "GFRK"
  name: "Global Fidelity Residual Kernel"
  primary_configuration: "GFRK-08-L010"
  shrinkage: 0.10
  configurations:
    - {id: GFRK-04-L010, qubits: 4, layers: 1, feature_scale: 1.0, entangle: true, alpha: 1.0, landmarks: 256}
    - {id: GFRK-06-L010, qubits: 6, layers: 1, feature_scale: 1.0, entangle: true, alpha: 1.0, landmarks: 256}
    - {id: GFRK-08-L010, qubits: 8, layers: 1, feature_scale: 1.0, entangle: true, alpha: 1.0, landmarks: 256}
  configuration_rule: "q scaling is fixed before development payload access; q=8 lambda=0.10 is primary"
  claimed_mechanism: "global state fidelity retains multi-qubit correlations discarded by the local one-RDM projection, while fixed shrinkage limits residual extrapolation"

controls:
  - id: C06
    description: "frozen outer-fold C06 prediction with the same safety guard"
  - id: TAP-RBF-SHR
    description: "identical D036 task-aligned coordinates and lambda=0.10 with an exact classical RBF"
  - id: D037-TSQR
    description: "immutable D037 result, not rerun or reranked"

hypotheses:
  H1: "GFRK-08-L010 will improve pooled OOF NRMSE by at least 5 percent versus C06"
  H2: "GFRK-08-L010 will improve or preserve C06 feasibility-constrained regret and infeasible selection"
  H3: "GFRK-08-L010 will beat TAP-RBF-SHR-q8-L010 by at least 5 percent"

decision_rule:
  scientifically_superior: "H1, H2, and H3 pass across five outer folds and 20 seeds, with the paired 95 percent bootstrap upper bound for GFRK-08-L010 minus C06 below zero"
  valid_negative: "complete source-bound endpoint with all integrity checks pass but any superiority condition fails"
  technical_stop: "source, split, projection, statevector, numerical, or resource integrity failure"
  after_negative: "record the evidence and open a new protocol; do not silently alter the kernel, shrinkage, controls, thresholds, or seeds"

resources:
  hardware: "recorded laptop: Intel Core i9-13900HX, 32 GiB RAM, NVIDIA RTX 4060 Laptop GPU; CPU-only execution"
  peak_working_set_gib: 24.0
  cpu_core_hours: 250.0
  wall_clock_days: 5.0
  free_disk_floor_gib: 20.0
  gpu_hours: 0.0

