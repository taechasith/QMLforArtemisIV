mathematical_contract:
  shared_first_stage: "r25_8 = RBF_0.25_q8(x; e)"
  common_orthogonalized_target: "e2 = e - r25_8_OOF on inner grouped out-of-fold rows"
  candidate_stack: "Psi_A=[1,F_4(e2),F_6(e2),F_8(e2)]"
  control_stack: "Psi_C=[1,R50_4(e2),R50_6(e2),R50_8(e2)]"
  candidate_prediction: "b_C06(x) + 0.10 * (r25_8(x) + Psi_A(x) beta_A)"
  classical_control: "b_C06(x) + 0.10 * (r25_8(x) + Psi_C(x) beta_C)"
  stack_ridge: 0.001
  final_shrinkage: 0.10
  safety_guard: "the frozen outer-fold C06 feasibility head is retained unchanged"

candidate:
  id: "OMFRK"
  name: "Orthogonalized Multi-Scale Fidelity Residual Kernel"
  primary_configuration: "OMFRK-ALL"
  q_values: [4, 6, 8]
  shared_first_stage_q: 8
  rbf_gamma_multipliers: [0.25, 0.50]
  landmarks: 256
  projection_layers: 1
  stack_ridge: 0.001
  configuration_rule: "shared q8 first stage, q4/6/8 second-stage columns, stack order, folds, seeds, shrinkage, and control are fixed before development payload access"
  claimed_mechanism: "cross-q fidelity complementarity may remain after one shared q8 classical correction"

controls:
  - id: C06
    description: "frozen outer-fold C06 prediction with the same safety guard"
  - id: OM-TWO-RBF
    description: "shared q8 RBF-0.25 first stage plus q4/6/8 RBF-0.50 second-stage stack"
  - id: D046-ORFRK
    description: "immutable D046 result, not rerun or reranked"

hypotheses:
  H1: "OMFRK-ALL will improve pooled OOF NRMSE by at least 5 percent versus C06"
  H2: "OMFRK-ALL will improve or preserve C06 feasibility-constrained regret and infeasible selection"
  H3: "OMFRK-ALL will beat OM-TWO-RBF by at least 5 percent"

decision_rule:
  scientifically_superior: "H1, H2, and H3 pass across five outer folds and 20 seeds, with paired 95 percent bootstrap upper bound for OMFRK-ALL minus C06 below zero"
  valid_negative: "complete source-bound endpoint with all integrity checks pass but any superiority condition fails"
  technical_stop: "source, split, stage-order, stack-shape, data-access, numerical, or resource integrity failure"
  after_negative: "record the evidence and open a new protocol; do not silently alter q values, first-stage q, stack columns, controls, thresholds, folds, or seeds"

resources:
  hardware: "recorded laptop: Intel Core i9-13900HX, 32 GiB RAM, NVIDIA RTX 4060 Laptop GPU; CPU-only execution"
  peak_working_set_gib: 24.0
  cpu_core_hours: 300.0
