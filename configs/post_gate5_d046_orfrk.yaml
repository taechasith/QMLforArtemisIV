mathematical_contract:
  c06_residual: "e = y - b_C06^{-inner}(x) on outer-training rows"
  shared_first_stage: "r25 = RBF_0.25(x; e)"
  orthogonalized_target: "e2 = e - r25_OOF on inner grouped out-of-fold rows"
  candidate_prediction: "b_C06(x) + 0.10 * (r25(x) + F_q(x; e2))"
  classical_control: "b_C06(x) + 0.10 * (r25(x) + RBF_0.50_q(x; e2))"
  second_stage_ridge: 1.0
  final_shrinkage: 0.10
  safety_guard: "the frozen outer-fold C06 feasibility head is retained unchanged"

candidate:
  id: "ORFRK"
  name: "Orthogonalized Residual Fidelity-RBF Kernel"
  primary_configuration: "ORFRK-08-R2"
  q_values: [4, 6, 8]
  rbf_gamma_multipliers: [0.25, 0.50]
  landmarks: 256
  projection_layers: 1
  first_stage: "RBF-0.25 fitted to the C06 residual"
  second_stage: "fidelity kernel fitted to e2 = e - inner OOF RBF-0.25 prediction"
  configuration_rule: "stage order, q values, channels, folds, seeds, shrinkage, and control are fixed before development payload access"
  claimed_mechanism: "remove shared RBF residual signal before testing fidelity-specific residual information"

controls:
  - id: C06
    description: "frozen outer-fold C06 prediction with the same safety guard"
  - id: TWO-RBF-q-R2
    description: "shared RBF-0.25 first stage plus matched RBF-0.50 second stage at each q"
  - id: D045-MSFRK
    description: "immutable D045 result, not rerun or reranked"

hypotheses:
  H1: "ORFRK-08-R2 will improve pooled OOF NRMSE by at least 5 percent versus C06"
  H2: "ORFRK-08-R2 will improve or preserve C06 feasibility-constrained regret and infeasible selection"
  H3: "ORFRK-08-R2 will beat TWO-RBF-08-R2 by at least 5 percent"

decision_rule:
  scientifically_superior: "H1, H2, and H3 pass across five outer folds and 20 seeds, with paired 95 percent bootstrap upper bound for ORFRK-08-R2 minus C06 below zero"
  valid_negative: "complete source-bound endpoint with all integrity checks pass but any superiority condition fails"
  technical_stop: "source, split, stage-order, data-access, numerical, or resource integrity failure"
  after_negative: "record the evidence and open a new protocol; do not silently alter the orthogonalized target, q values, control, thresholds, folds, or seeds"

resources:
  hardware: "recorded laptop: Intel Core i9-13900HX, 32 GiB RAM, NVIDIA RTX 4060 Laptop GPU; CPU-only execution"
  peak_working_set_gib: 24.0
  cpu_core_hours: 250.0
  wall_clock_days: 5.0
  free_disk_floor_gib: 17.0
  gpu_hours: 0.0

