mathematical_contract:
  input_space: "fold-local transformed and PCA-compressed development features u in R^q, plus a scalar baseline b"
  output_space: "standardized robust correction cost y in R and feasibility c in {0,1}"
  primary_target: "robust_total_correction_delta_v_m_s"
  feasibility_target: "independently_propagated_feasible"
  baseline_input: "low_fidelity_cost_m_s, standardized with the training-fold target scaler"
  residual_target: "r = y - b"
  state: "|psi(u)> = U_L(u)|0^q>"
  encoding: "per layer and qubit, RY(s*u_j) then RZ(s*u_(j+1)); optional nearest-neighbor CNOT ring"
  projection: "r_Q(u) = (<X_1>,<Y_1>,<Z_1>,...,<X_q>,<Y_q>,<Z_q>)"
  kernel: "K_Q(u,v) = exp(-gamma * sum_j ||rho_j(u)-rho_j(v)||_F^2) = exp(-gamma/2 * ||r_Q(u)-r_Q(v)||_2^2)"
  residual_prediction: "f_Q(u,b) = b + K_Q(u,U) alpha"
  kernel_fit: "alpha = argmin_a ||K_Q(U,U)a - r||_2^2 + lambda ||a||_2^2, implemented with deterministic Nystrom landmarks"
  feasibility_prediction: "p_Q(u) = clip(K_Q^F(u,U) beta, 0, 1)"
  feasibility_fit: "beta minimizes the same ridge least-squares objective against c"
  selection: "within each decision set, choose the lowest predicted cost among p_Q >= 0.5; use the frozen 20 m/s penalty otherwise"

candidate:
  id: "PRQK"
  name: "Physics-Anchored Residual Projected Quantum Kernel"
  primary_configuration: "PRQK-08-N"
  configurations:
    - {id: PRQK-04-N, qubits: 4, layers: 1, feature_scale: 1.0, entangle: false, gamma_multiplier: 0.25, alpha: 1.0, landmarks: 256}
    - {id: PRQK-04-E, qubits: 4, layers: 1, feature_scale: 1.0, entangle: true, gamma_multiplier: 0.25, alpha: 1.0, landmarks: 256}
    - {id: PRQK-06-N, qubits: 6, layers: 1, feature_scale: 1.0, entangle: false, gamma_multiplier: 0.25, alpha: 1.0, landmarks: 256}
    - {id: PRQK-06-E, qubits: 6, layers: 1, feature_scale: 1.0, entangle: true, gamma_multiplier: 0.25, alpha: 1.0, landmarks: 256}
    - {id: PRQK-08-N, qubits: 8, layers: 1, feature_scale: 1.0, entangle: false, gamma_multiplier: 0.25, alpha: 1.0, landmarks: 256}
    - {id: PRQK-08-E, qubits: 8, layers: 1, feature_scale: 1.0, entangle: true, gamma_multiplier: 0.25, alpha: 1.0, landmarks: 256}
  configuration_rule: "fixed before opening development payloads; dimensions and entanglement are ablations, not post-outcome tuning"
  claimed_mechanism: "remove the dominant low-fidelity physics signal from the quantum map and reserve the kernel for learning a structured correction residual"

controls:
  - id: C06
    description: "frozen boosted physics residual using all transformed features and the same baseline"
  - id: A02-R
    description: "exact classical RBF residual kernel on the identical baseline-excluded compressed inputs and identical landmarks"
  - id: BASELINE
    description: "low-fidelity physics cost with no learned residual"
  - id: P001-Q01b
    description: "committed historical projected-kernel result; report-only and not rerun"

hypotheses:
  H1: "PRQK-08-N will reduce pooled OOF NRMSE by at least 5 percent versus C06"
  H2: "PRQK will not worsen feasibility-constrained regret or infeasible selection relative to C06"
  H3: "PRQK feasibility will meet the frozen safety comparator rule against C02: Brier <= 1.05*C02, AUROC >= C02-0.01, recall >= C02-0.02"
  H4: "If PRQK improves, identical-input A02-R must not show the same improvement before any quantum-specific interpretation is considered"

decision_rule:
  scientifically_superior: "H1, H2, and H3 all pass across all five folds and 20 seeds, and the paired 95 percent bootstrap upper bound for PRQK-08-N minus C06 NRMSE is below zero"
  valid_negative: "the campaign is complete and integrity checks pass but the primary configuration fails any superiority condition"
  technical_stop: "source, split, row, lock, numerical, or resource integrity fails before a valid endpoint"
  after_negative: "record a future-only improvement protocol and do not silently retry this configuration"

