mathematical_contract:
  input: "D039 error-conditioned fold-local task-aligned score z in R^q"
  fidelity_correction: "delta_F = E_F alpha_F using exact global fidelity features"
  rbf_correction: "delta_R25 = E_R25 alpha_R25 using exact RBF features with gamma multiplier 0.25"
  hybrid_prediction: "f_H(x) = b_C06^outer(x) + 0.10 * [eta delta_F(x) + (1-eta) delta_R25(x)]"
  classical_control: "f_CC(x) = b_C06^outer(x) + 0.10 * [eta delta_R25(x) + (1-eta) delta_R50(x)]"
  mixture_weights: "eta in {0.25, 0.50, 0.75}; eta=0.50 is primary"
  target: "cross-fitted C06 residual e_i = y_i - b_C06^{-inner}(x_i)"
  safety_guard: "the frozen outer-fold C06 feasibility head is retained unchanged"

candidate:
  id: "HEFRK"
  name: "Hybrid Error-Conditioned Fidelity-RBF Residual Kernel"
  primary_configuration: "HEFRK-08-E050"
  shrinkage: 0.10
  rbf_gamma_multipliers: [0.25, 0.50]
  eta_values: [0.25, 0.50, 0.75]
  configurations:
    - {id: HEFRK-04-E025, qubits: 4, layers: 1, feature_scale: 1.0, entangle: true, alpha: 1.0, landmarks: 256, eta: 0.25}
    - {id: HEFRK-04-E050, qubits: 4, layers: 1, feature_scale: 1.0, entangle: true, alpha: 1.0, landmarks: 256, eta: 0.50}
    - {id: HEFRK-04-E075, qubits: 4, layers: 1, feature_scale: 1.0, entangle: true, alpha: 1.0, landmarks: 256, eta: 0.75}
    - {id: HEFRK-06-E025, qubits: 6, layers: 1, feature_scale: 1.0, entangle: true, alpha: 1.0, landmarks: 256, eta: 0.25}
    - {id: HEFRK-06-E050, qubits: 6, layers: 1, feature_scale: 1.0, entangle: true, alpha: 1.0, landmarks: 256, eta: 0.50}
    - {id: HEFRK-06-E075, qubits: 6, layers: 1, feature_scale: 1.0, entangle: true, alpha: 1.0, landmarks: 256, eta: 0.75}
    - {id: HEFRK-08-E025, qubits: 8, layers: 1, feature_scale: 1.0, entangle: true, alpha: 1.0, landmarks: 256, eta: 0.25}
    - {id: HEFRK-08-E050, qubits: 8, layers: 1, feature_scale: 1.0, entangle: true, alpha: 1.0, landmarks: 256, eta: 0.50}
    - {id: HEFRK-08-E075, qubits: 8, layers: 1, feature_scale: 1.0, entangle: true, alpha: 1.0, landmarks: 256, eta: 0.75}
  configuration_rule: "q and eta grid are fixed before development payload access; q=8 eta=0.50 is primary"
  claimed_mechanism: "a fixed hybrid can retain complementary residual structure if fidelity and RBF corrections make non-identical errors"

controls:
  - id: C06
    description: "frozen outer-fold C06 prediction with the same safety guard"
  - id: TWO-RBF
    description: "same eta weights mixing RBF gamma 0.25 and gamma 0.50 corrections"
  - id: D039-EC-GFRK
    description: "immutable D039 result, not rerun or reranked"

hypotheses:
  H1: "HEFRK-08-E050 will improve pooled OOF NRMSE by at least 5 percent versus C06"
  H2: "HEFRK-08-E050 will improve or preserve C06 feasibility-constrained regret and infeasible selection"
  H3: "HEFRK-08-E050 will beat TWO-RBF-08-E050 by at least 5 percent"

decision_rule:
  scientifically_superior: "H1, H2, and H3 pass across five outer folds and 20 seeds, with the paired 95 percent bootstrap upper bound for HEFRK-08-E050 minus C06 below zero"
  valid_negative: "complete source-bound endpoint with all integrity checks pass but any superiority condition fails"
  technical_stop: "source, split, feature, mixture, data-access, numerical, or resource integrity failure"
  after_negative: "record the evidence and open a new protocol; do not silently alter eta, gamma, kernel channels, controls, thresholds, or seeds"

resources:
