  qml_source: "src/openqfuel/qml.py"
  campaign_source: "scripts/run_post_gate5_d040_cegfrk.py"
  protocol_source: "docs/post_gate5_d040_cegfrk_protocol.md"

mathematical_contract:
  raw_input: "error-conditioned fold-local PLS score z in R^q from D039"
  centered_feature_map: "E = K(Z_train,Z_landmarks)W; E_c = E - mean_train(E); E_v,c = K(Z_val,Z_landmarks)W - mean_train(E)"
  quantum_state: "psi(z) = U_RY/RZ,CNOT(z)|0^q> with one entangling layer"
  quantum_kernel: "K_F(z,v) = |<psi(z)|psi(v)>|^2"
  target: "cross-fitted C06 residual e_i = y_i - b_C06^{-inner}(x_i)"
  prediction: "f_Q(x) = b_C06^outer(x) + 0.10 * E_v,c alpha"
  classical_control: "EC-TAP-RBF-C-SHR-q uses the identical centered feature construction, ridge, and lambda=0.10"
  safety_guard: "the frozen outer-fold C06 feasibility head is retained unchanged"

candidate:
  id: "CE-GFRK"
  name: "Centered Error-Conditioned Global Fidelity Residual Kernel"
  primary_configuration: "CE-GFRK-08-L010"
  shrinkage: 0.10
  configurations:
    - {id: CE-GFRK-04-L010, qubits: 4, layers: 1, feature_scale: 1.0, entangle: true, alpha: 1.0, landmarks: 256}
    - {id: CE-GFRK-06-L010, qubits: 6, layers: 1, feature_scale: 1.0, entangle: true, alpha: 1.0, landmarks: 256}
    - {id: CE-GFRK-08-L010, qubits: 8, layers: 1, feature_scale: 1.0, entangle: true, alpha: 1.0, landmarks: 256}
  configuration_rule: "q scaling is fixed before development payload access; q=8 lambda=0.10 is primary"
  claimed_mechanism: "training-only kernel centering removes a dominant common-similarity component while preserving error-conditioned fidelity structure"

controls:
  - id: C06
    description: "frozen outer-fold C06 prediction with the same safety guard"
  - id: EC-TAP-RBF-C-SHR
    description: "identical error-conditioned scores and training-centered RBF feature map with lambda=0.10"
  - id: D039-EC-GFRK
    description: "immutable D039 result, not rerun or reranked"

hypotheses:
  H1: "CE-GFRK-08-L010 will improve pooled OOF NRMSE by at least 5 percent versus C06"
  H2: "CE-GFRK-08-L010 will improve or preserve C06 feasibility-constrained regret and infeasible selection"
  H3: "CE-GFRK-08-L010 will beat EC-TAP-RBF-C-SHR-q8-L010 by at least 5 percent"

decision_rule:
  scientifically_superior: "H1, H2, and H3 pass across five outer folds and 20 seeds, with the paired 95 percent bootstrap upper bound for CE-GFRK-08-L010 minus C06 below zero"
  valid_negative: "complete source-bound endpoint with all integrity checks pass but any superiority condition fails"
  technical_stop: "source, split, feature-centering, data-access, statevector, numerical, or resource integrity failure"
  after_negative: "record the evidence and open a new protocol; do not silently alter centering, the kernel, conditioning feature, shrinkage, controls, thresholds, or seeds"

resources:
  hardware: "recorded laptop: Intel Core i9-13900HX, 32 GiB RAM, NVIDIA RTX 4060 Laptop GPU; CPU-only execution"
  peak_working_set_gib: 24.0
  cpu_core_hours: 250.0
  wall_clock_days: 5.0
  free_disk_floor_gib: 18.0
  gpu_hours: 0.0
  floor_basis: "predeclared 18 GiB floor retains a 1.8 GiB margin below the observed D039 endpoint while preserving the same CPU/RAM limits"

reporting:
